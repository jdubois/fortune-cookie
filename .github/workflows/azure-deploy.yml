name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  RESOURCE_GROUP: fortune-cookie-rg
  LOCATION: francecentral
  CONTAINER_APP_ENV: fortune-cookie-env
  CONTAINER_APP_NAME: fortune-cookie-app
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/fortune-cookie

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GraalVM native image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-native
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
            ${{ env.GHCR_IMAGE }}:native
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install containerapp extension
        run: az extension add --name containerapp --upgrade -y

      - name: Create or update Container App
        env:
          GHCR_PAT: ${{ secrets.GHCR_PULL_PAT }}
        run: |
          set -euo pipefail
          IMAGE="$GHCR_IMAGE:${{ github.sha }}"

          if az containerapp show -n "$CONTAINER_APP_NAME" -g "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "Updating existing Container App..."
            az containerapp update \
              --name "$CONTAINER_APP_NAME" -g "$RESOURCE_GROUP" \
              --image "$IMAGE"
          else
            echo "Creating Container App..."
            az containerapp create \
              --name "$CONTAINER_APP_NAME" -g "$RESOURCE_GROUP" \
              --environment "$CONTAINER_APP_ENV" \
              --image "$IMAGE" \
              --target-port 8080 --ingress external --transport auto \
              --cpu 0.25 --memory 0.5Gi \
              --min-replicas 0 --max-replicas 5 \
              --registry-server ghcr.io \
              --registry-username "${{ github.repository_owner }}" \
              --registry-password "$GHCR_PAT"

            echo "Adding liveness/readiness/startup probes..."
            az containerapp show -n "$CONTAINER_APP_NAME" -g "$RESOURCE_GROUP" -o json \
              | jq '.properties.template.containers |= map(. + {probes:[
                  {type:"Liveness",  httpGet:{path:"/actuator/health/liveness", port:8080}, initialDelaySeconds:10, periodSeconds:20},
                  {type:"Readiness", httpGet:{path:"/actuator/health/readiness",port:8080}, initialDelaySeconds:3,  periodSeconds:10},
                  {type:"Startup",   httpGet:{path:"/actuator/health/readiness",port:8080}, failureThreshold:30,    periodSeconds:5}
                ]})' > app-with-probes.json
            az containerapp update -n "$CONTAINER_APP_NAME" -g "$RESOURCE_GROUP" --yaml app-with-probes.json >/dev/null
            rm app-with-probes.json
          fi

          FQDN=$(az containerapp show -n "$CONTAINER_APP_NAME" -g "$RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "✅ Deployed at: https://$FQDN"
          echo "app_url=https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
